<head>
    <style>
        body {
            background-color: #e4dce8;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }
        .header-section {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px 20px 20px;
        }
        h1 {
            color: #444;
            font-size: 2.5em;
            margin: 0 0 20px 0;
        }
        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 70%;
            outline: none;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1557b0;
        }
    </style>
    <title>登録</title>
    </head>
    <body>
    <h1>ログイン</h1>
    </body>
    <div class="header-section">
    <form method="post">
    <input name="username"type="text"placeholder="ユーザー名（本名は避けてねー）">
    <input name="password"type="password"placeholder="パスワード">
    <button>ログイン</button>
    </div>
    </form>
