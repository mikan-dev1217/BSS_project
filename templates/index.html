<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: #e4dce8;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
    }
    .header-section {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px 20px 20px;
    }
    h1 {
        color: #444;
        font-size: 2.5em;
        margin: 0 0 20px 0;
    }
    input[type="text"] {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 70%;
        outline: none;
    }
    .main-content {
        background-color: #f8f9fa;
        min-height: 100vh;
        padding: 20px;
    }
    .list-container {
        max-width: 600px;
        margin: 0 auto;
    }
    ul {
        padding: 0;
        margin: 0;
    }
    li {
        background-color: white;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        list-style: none;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        display:flex;
        justify-content:space-between;
        align-items:center;
    }
    button {
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
    }
    button:hover {
        background-color: #1557b0;
    }
</style>
<title>Echo</title>
</head>
<body>
<div class="header-section">
<h1>Echo</h1>
<form action="/post" method="post">
<input type="text" name="content" placeholder="書き込み" required>
<button type="submit">投稿</button>
</form>
</div>

<div class="main-content">
<div class="list-container">
<ul>
{% for p in posts %}
<li>
<div>
<div style="color: gray; font-size: 0.8em; margin-bottom: 5px;">投稿時間: {{ p[2] }}</div>
<strong>{{p[3]}}</strong>:{{ p[1] }}
</div>
<div>
<form action="/delete/{{ p[0] }}" method="post" style="display:inline;">
<button type="submit" style="background-color: #666; font-size: 0.8em; padding: 5px 10px;">削除</button>
</form>
<form action="/like/{{ p[0] }}" method="post" style="display:inline;">
<button type="submit">👍{{ p[5] }}</button></form>
</form>
</div>
</li>
{% endfor %}
</ul>
<hr>
<a href="/login">ログイン</a>
<a href="/register">登録</a>
<footer style="color: gray; font-size: 0.9em;">
producer: wataru shiraishi
</footer>

</div>
</div>
</body>
</html>
